# .github/workflows/pr-description.yml
#
# Auto-generates a structured PR description from conventional commits.
# Replaces manual PR writeups — extracts type, scope, and groups changes.
# Works with the conventional commit format enforced by prepare-commit-msg hook.

name: PR Auto-Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  describe:
    runs-on: ubuntu-latest
    # Only auto-describe if PR body is empty or has the placeholder
    if: >
      github.event.action == 'opened' ||
      contains(github.event.pull_request.body, '<!-- auto-description -->')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR description
        id: describe
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Collect commits
          COMMITS=$(git log --oneline "${BASE}..${HEAD}" 2>/dev/null || echo "")
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || echo "0")

          # Parse conventional commits into categories
          FEATS=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ feat" | sed 's/^[a-f0-9]* /- /' || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ fix" | sed 's/^[a-f0-9]* /- /' || true)
          DOCS=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ docs" | sed 's/^[a-f0-9]* /- /' || true)
          REFACTORS=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ refactor" | sed 's/^[a-f0-9]* /- /' || true)
          TESTS=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ test" | sed 's/^[a-f0-9]* /- /' || true)
          OTHER=$(echo "$COMMITS" | grep -ivE "^[a-f0-9]+ (feat|fix|docs|refactor|test)" | sed 's/^[a-f0-9]* /- /' || true)

          # Changed files summary
          FILES_CHANGED=$(git diff --stat "${BASE}..${HEAD}" | tail -1)
          KEY_FILES=$(git diff --name-only "${BASE}..${HEAD}" | head -20)

          # Check for breaking changes
          BREAKING=$(git log "${BASE}..${HEAD}" --grep="BREAKING CHANGE" --oneline || true)

          # Build description
          BODY="<!-- auto-description -->
          ## Summary

          ${COMMIT_COUNT} commits from \`$(git rev-parse --abbrev-ref HEAD)\` → \`${{ github.event.pull_request.base.ref }}\`

          ${FILES_CHANGED}
          "

          if [[ -n "$BREAKING" ]]; then
            BODY="${BODY}
          ### ⚠️ Breaking Changes
          ${BREAKING}
          "
          fi

          if [[ -n "$FEATS" ]]; then
            BODY="${BODY}
          ### Features
          ${FEATS}
          "
          fi

          if [[ -n "$FIXES" ]]; then
            BODY="${BODY}
          ### Bug Fixes
          ${FIXES}
          "
          fi

          if [[ -n "$REFACTORS" ]]; then
            BODY="${BODY}
          ### Refactors
          ${REFACTORS}
          "
          fi

          if [[ -n "$TESTS" ]]; then
            BODY="${BODY}
          ### Tests
          ${TESTS}
          "
          fi

          if [[ -n "$DOCS" ]]; then
            BODY="${BODY}
          ### Documentation
          ${DOCS}
          "
          fi

          if [[ -n "$OTHER" ]]; then
            BODY="${BODY}
          ### Other
          ${OTHER}
          "
          fi

          BODY="${BODY}
          ### Key Files Changed
          \`\`\`
          $(echo "$KEY_FILES" | head -15)
          \`\`\`

          ---
          *Auto-generated from conventional commits. Edit freely.*
          "

          # Write to file for the next step (avoids shell escaping issues)
          echo "$BODY" > /tmp/pr-body.md

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/pr-body.md', 'utf8');
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body
            });
